<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Globe Tracker — Live ADS-B & AIS</title>

  <!--
    CesiumJS 1.124 — latest stable as of early 2026.
    Check https://cesium.com/downloads/ for newer versions and update both URLs.

    You will also need a free Cesium ion access token:
      1. Sign up at https://ion.cesium.com/ (free tier)
      2. Replace 'YOUR_CESIUM_ION_TOKEN_HERE' below with your token

    Without a valid token the globe renders with a default Bing Maps imagery
    layer but displays a watermark banner. Terrain still loads.
  -->
  <link
    rel="stylesheet"
    href="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Widgets/widgets.css"
  />
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Cesium.js"></script>
  <!--
    satellite.js — SGP4/SDP4 orbital propagation library.
    Used to compute real-time satellite positions from TLE data entirely in
    the browser with no additional API calls.
    Docs: https://github.com/shashwatak/satellite-js
  -->
  <script src="https://cdn.jsdelivr.net/npm/satellite.js@4.1.3/dist/satellite.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
    }

    /* CesiumJS requires an explicit sized container. */
    #cesiumContainer { width: 100%; height: 100%; }

    /* ── Control panel ─────────────────────────────────────────────────── */
    #controls {
      position: absolute;
      top: 12px; left: 12px;
      z-index: 10;
      background: rgba(15, 17, 25, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 14px 18px;
      color: #e0e0e0;
      min-width: 190px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    #controls h2 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 12px;
    }

    .layer-toggle {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 8px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .layer-toggle:last-child { margin-bottom: 0; }

    .layer-toggle input[type="checkbox"] {
      width: 15px; height: 15px;
      cursor: pointer;
    }

    /* Plane checkbox accent */
    #togglePlanes { accent-color: #4fc3f7; }
    /* Ship checkbox accent */
    #toggleShips  { accent-color: #aed581; }

    .dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-plane    { background: #4fc3f7; }
    .dot-ship     { background: #aed581; }
    .dot-sat      { background: #ce93d8; }
    .dot-airport  { background: #ffb300; }
    .dot-border   { background: #b0bec5; border-radius: 2px; }  /* square = lines */
    .dot-road     { background: #ffcc80; border-radius: 2px; }

    /* Checkbox accents */
    #toggleAirports { accent-color: #ffb300; }
    #toggleBorders  { accent-color: #b0bec5; }
    #toggleRoads    { accent-color: #ffcc80; }

    /* ── Status bar ────────────────────────────────────────────────────── */
    #statusBar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      z-index: 10;
      background: rgba(8, 10, 16, 0.82);
      color: #9e9e9e;
      font-size: 11px;
      padding: 5px 14px;
      display: flex;
      gap: 18px;
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
    }

    .status-item { display: flex; align-items: center; gap: 5px; }
    .status-item strong { color: #e0e0e0; }

    #clearDbBtn {
      margin-left: auto;
      padding: 2px 10px;
      font-size: 11px;
      background: rgba(244, 67, 54, 0.15);
      color: #ef9a9a;
      border: 1px solid rgba(244, 67, 54, 0.35);
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #clearDbBtn:hover { background: rgba(244, 67, 54, 0.35); }
    #clearDbBtn:disabled { opacity: 0.45; cursor: default; }

    /* Pulsing fetch indicator dot */
    #fetchIndicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf50;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    #fetchIndicator.fetching {
      background: #ff9800;
      animation: blink 0.7s infinite alternate;
    }
    #fetchIndicator.error { background: #f44336; }

    @keyframes blink {
      from { opacity: 1; }
      to   { opacity: 0.25; }
    }

    /* ── Info modal (planes + ships) ───────────────────────────────────── */
    #infoModal {
      display: none;
      position: absolute;
      top: var(--modal-top, 220px); left: 12px;
      z-index: 20;
      background: rgba(12, 14, 22, 0.96);
      border: 1px solid rgba(79, 195, 247, 0.3);
      border-radius: 12px;
      width: 260px;
      max-height: calc(100vh - var(--modal-top, 220px) - 80px);
      overflow-y: auto;
      color: #e0e0e0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    }

    #infoModal.ship-mode    { border-color: rgba(174, 213, 129, 0.35); }
    #infoModal.airport-mode { border-color: rgba(255, 179, 0, 0.35); }
    #infoModal.airport-mode .modal-title      { color: #ffb300; }
    #infoModal.airport-mode .modal-type-badge { background: rgba(255, 179, 0, 0.15); color: #ffb300; }
    #infoModal.visible   { display: block; }

    /* Photo banner */
    #modalPhoto {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: none;
      background: #0a0c14;
    }
    #modalPhoto.loaded { display: block; }

    /* Photo placeholder shown while loading */
    #modalPhotoPlaceholder {
      width: 100%;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      background: rgba(255,255,255,0.03);
      color: #333;
    }
    #modalPhotoPlaceholder.hidden { display: none; }

    .modal-body { padding: 16px 20px 18px; }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      color: #4fc3f7;
      letter-spacing: 0.05em;
    }
    #infoModal.ship-mode .modal-title { color: #aed581; }

    .modal-subtitle {
      font-size: 12px;
      color: #9e9e9e;
      margin-top: 3px;
    }

    .modal-type-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      margin-top: 4px;
      background: rgba(79, 195, 247, 0.15);
      color: #4fc3f7;
      letter-spacing: 0.05em;
    }
    #infoModal.ship-mode .modal-type-badge {
      background: rgba(174, 213, 129, 0.15);
      color: #aed581;
    }

    .modal-close {
      background: none;
      border: none;
      color: #9e9e9e;
      font-size: 20px;
      cursor: pointer;
      padding: 0 0 0 12px;
      line-height: 1;
      flex-shrink: 0;
    }
    .modal-close:hover { color: #fff; }

    /* Route row (planes only) */
    #modalRoute {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      background: rgba(79, 195, 247, 0.06);
      border-radius: 8px;
      padding: 10px 12px;
    }
    #modalRoute.hidden { display: none; }

    .route-airport { flex: 1; text-align: center; }
    .route-airport .iata {
      font-size: 20px; font-weight: 700; color: #fff;
    }
    .route-airport .city {
      font-size: 11px; color: #9e9e9e; margin-top: 2px;
    }
    .route-arrow { color: #4fc3f7; font-size: 18px; flex-shrink: 0; }

    /* Stats grid */
    .modal-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #757575;
      margin-bottom: 3px;
    }
    .stat-value { font-size: 14px; font-weight: 600; color: #e0e0e0; }

    .modal-footer {
      margin-top: 10px;
      font-size: 11px;
      color: #616161;
      text-align: center;
    }

    .modal-search-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: calc(100% - 40px);
      margin: 8px 20px 16px;
      padding: 7px 12px;
      background: rgba(79, 195, 247, 0.08);
      border: 1px solid rgba(79, 195, 247, 0.3);
      border-radius: 6px;
      color: #4fc3f7;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .modal-search-btn:hover {
      background: rgba(79, 195, 247, 0.18);
      border-color: rgba(79, 195, 247, 0.6);
    }
    #infoModal.ship-mode .modal-search-btn {
      background: rgba(174, 213, 129, 0.08);
      border-color: rgba(174, 213, 129, 0.3);
      color: #aed581;
    }
    #infoModal.ship-mode .modal-search-btn:hover {
      background: rgba(174, 213, 129, 0.18);
      border-color: rgba(174, 213, 129, 0.6);
    }

    /* ── Timeline / replay bar ─────────────────────────────────────────── */
    #timeline {
      position: absolute;
      bottom: 30px; /* sits just above the status bar */
      left: 0; right: 0;
      z-index: 10;
      background: rgba(8, 10, 16, 0.88);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(6px);
    }

    #liveBtn {
      flex-shrink: 0;
      background: rgba(76, 175, 80, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.5);
      color: #4caf50;
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #liveBtn:hover { background: rgba(76, 175, 80, 0.3); }
    #liveBtn.replay-mode {
      background: rgba(255, 152, 0, 0.15);
      border-color: rgba(255, 152, 0, 0.5);
      color: #ff9800;
    }

    #timeSlider {
      flex: 1;
      accent-color: #4fc3f7;
      height: 4px;
      cursor: pointer;
    }
    #timeSlider:disabled { opacity: 0.3; cursor: default; }

    #replayTimeDisplay {
      flex-shrink: 0;
      font-size: 11px;
      color: #9e9e9e;
      white-space: nowrap;
      min-width: 140px;
      text-align: right;
    }
    #replayTimeDisplay.replay-mode { color: #ff9800; }
  </style>
</head>
<body>

  <div id="cesiumContainer"></div>

  <!-- Layer control panel -->
  <div id="controls">
    <h2>Globe Tracker</h2>

    <label class="layer-toggle">
      <input type="checkbox" id="togglePlanes" checked />
      <span class="dot dot-plane"></span>
      Planes
    </label>

    <label class="layer-toggle">
      <input type="checkbox" id="toggleShips" checked />
      <span class="dot dot-ship"></span>
      Ships
    </label>

    <label class="layer-toggle">
      <input type="checkbox" id="toggleSats" checked />
      <span class="dot dot-sat"></span>
      Satellites
    </label>

    <label class="layer-toggle">
      <input type="checkbox" id="toggleAirports" checked />
      <span class="dot dot-airport"></span>
      Airports
    </label>

    <div style="margin-top:10px; border-top:1px solid rgba(255,255,255,0.08); padding-top:10px;">
      <div style="font-size:10px;color:#757575;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Map Layers</div>
      <label class="layer-toggle">
        <input type="checkbox" id="toggleBorders" checked />
        <span class="dot dot-border"></span>
        Borders
      </label>
      <label class="layer-toggle">
        <input type="checkbox" id="toggleRoads" checked />
        <span class="dot dot-road"></span>
        Roads
      </label>
    </div>

    <div style="margin-top:10px; border-top:1px solid rgba(255,255,255,0.08); padding-top:10px;">
      <div style="font-size:10px;color:#757575;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Sat Group</div>
      <select id="satGroup" style="width:100%;background:#0f111a;color:#ccc;border:1px solid rgba(255,255,255,0.12);border-radius:4px;padding:4px 6px;font-size:12px;cursor:pointer;">
        <option value="visual">All Active (~1500)</option>
        <option value="stations">Space Stations (~5)</option>
      </select>
    </div>
  </div>

  <!-- Timeline / replay bar -->
  <div id="timeline">
    <button id="liveBtn">● Live</button>
    <input type="range" id="timeSlider" min="0" max="0" value="0" step="60" disabled />
    <span id="replayTimeDisplay">No history yet</span>
  </div>

  <!-- Status bar -->
  <div id="statusBar">
    <div class="status-item">
      <div id="fetchIndicator"></div>
      <span id="statusText">Initialising…</span>
    </div>
    <div class="status-item">
      Planes: <strong id="planeCount">—</strong>
    </div>
    <div class="status-item">
      Ships: <strong id="shipCount">—</strong>
    </div>
    <div class="status-item">
      Sats: <strong id="satCount">—</strong>
    </div>
    <div class="status-item">
      Updated: <strong id="lastUpdate">—</strong>
    </div>
    <button id="clearDbBtn" title="Delete all recorded plane and ship history from the database">Clear DB</button>
  </div>

  <!--
    Set your Cesium ion access token here.
    Get a free token at https://ion.cesium.com/
  -->
  <script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIwN2ZjNTkyNC1iODJiLTRjZjAtYmQ5MC02ZGFlNTUxZTk1ZTAiLCJpZCI6NDA3MTYyLCJpYXQiOjE3NzQxMTc0MTF9.izM2b7KCDi2oG94ZPbN8csZLh9b3Mg1c4p9ZbXCzhzk';

    /*
      Google Photorealistic 3D Tiles (optional).
      Steps to enable:
        1. Go to https://console.cloud.google.com/
        2. Enable the "Map Tiles API" for your project.
        3. Create an API key and paste it below.
        4. Restrict the key to "Map Tiles API" + your domain for safety.
      Leave as 'YOUR_GOOGLE_MAPS_API_KEY' to use Cesium World Terrain instead.
    */
    const GOOGLE_MAPS_API_KEY = 'YOUR_GOOGLE_MAPS_API_KEY';
  </script>

  <!-- Unified info modal (planes + ships) -->
  <div id="infoModal">
    <!-- Photo banner — hidden until image loads successfully -->
    <div id="modalPhotoPlaceholder">✈</div>
    <img id="modalPhoto" alt="" />

    <div class="modal-body">
      <div class="modal-header">
        <div>
          <div class="modal-title"    id="modalTitle">—</div>
          <div class="modal-subtitle" id="modalSubtitle">Loading…</div>
          <div class="modal-type-badge" id="modalTypeBadge"></div>
        </div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>

      <!-- Route row — shown for planes, hidden for ships -->
      <div id="modalRoute">
        <div class="route-airport">
          <div class="iata" id="modalOriginIata">—</div>
          <div class="city" id="modalOriginCity">—</div>
        </div>
        <div class="route-arrow">✈</div>
        <div class="route-airport">
          <div class="iata" id="modalDestIata">—</div>
          <div class="city" id="modalDestCity">—</div>
        </div>
      </div>

      <div class="modal-stats">
        <div class="stat">
          <div class="stat-label" id="statLabel1">Altitude</div>
          <div class="stat-value" id="modalStat1">—</div>
        </div>
        <div class="stat">
          <div class="stat-label" id="statLabel2">Speed</div>
          <div class="stat-value" id="modalStat2">—</div>
        </div>
        <div class="stat">
          <div class="stat-label" id="statLabel3">Heading</div>
          <div class="stat-value" id="modalStat3">—</div>
        </div>
        <div class="stat">
          <div class="stat-label" id="statLabel4">ID</div>
          <div class="stat-value" id="modalStat4">—</div>
        </div>
      </div>
      <div class="modal-footer" id="modalFooter"></div>
      <button class="modal-search-btn" id="modalSearchBtn" onclick="modalSearchOpen()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search for more info
      </button>
    </div>
  </div>

  <!-- Order matters: api → entityLayer → app -->
  <script src="js/api.js"></script>
  <script src="js/entityLayer.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
